
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ NEURAL-LINK GOMOKU</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.8);
    --accent: #06b6d4;
    --player: #22c55e;
    --ai: #ef4444;
    --glass: rgba(255, 255, 255, 0.05);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Rajdhani', sans-serif;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 10px;
  }

  /* Cyberpunk HUD Decor */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(10, 15, 31, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 4px, 3px 100%;
    pointer-events: none;
    z-index: 10;
  }

  .header { 
    margin-bottom: 20px; 
    text-align: center; 
    width: 100%; 
    max-width: 900px;
  }
  
  h1 { 
    margin: 0; 
    font-family: 'Orbitron', sans-serif; 
    font-size: 28px; 
    text-shadow: 0 0 10px var(--accent); 
    color: var(--accent);
  }

  .subtitle {
    color: #64748b;
    font-size: 14px;
    margin-top: 5px;
  }

  .main-container {
    display: flex;
    gap: 20px;
    padding: 20px;
    backdrop-filter: blur(10px);
    z-index: 5;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1200px;
    width: 100%;
  }

  /* Board Styling */
  #board {
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    gap: 3px;
    background: rgba(0, 0, 0, 0.5);
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
    width: min(500px, 90vw);
    height: min(500px, 90vw);
    flex-shrink: 0;
  }

  .cell {
    background: rgba(30, 41, 59, 0.5);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .cell:hover { background: rgba(51, 65, 85, 0.8); transform: scale(1.05); z-index: 2; }

  /* Pieces */
  .p1::after {
    content: ''; width: 75%; height: 75%; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #4ade80, #166534);
    box-shadow: 0 0 15px var(--player);
    animation: dropIn 0.3s ease-out;
  }
  .p2::after {
    content: ''; width: 75%; height: 75%; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #f87171, #991b1b);
    box-shadow: 0 0 15px var(--ai);
    animation: dropIn 0.3s ease-out;
  }

  @keyframes dropIn { from { transform: scale(3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* Heatmap Overlays */
  .cell.danger { box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.6); background: rgba(127, 29, 29, 0.2); }
  .cell.hint { box-shadow: inset 0 0 10px rgba(34, 197, 94, 0.3); }

  /* Right Panel: Stats & Log */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 250px;
    min-height: 500px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--glass);
    padding: 15px;
    border-left: 4px solid var(--accent);
    border-radius: 4px;
    flex-shrink: 0;
  }

  .stat-label { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 20px; font-weight: bold; font-family: 'Orbitron', sans-serif; margin-top: 8px; }

  .log-container {
    background: var(--panel);
    border: 1px solid var(--glass);
    padding: 12px;
    border-left: 4px solid var(--accent);
    border-radius: 4px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    min-height: 250px;
  }

  .log-label { 
    font-size: 12px; 
    color: var(--accent); 
    text-transform: uppercase; 
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  #log {
    flex-grow: 1;
    background: rgba(0,0,0,0.5);
    padding: 8px;
    font-size: 11px;
    overflow-y: auto;
    font-family: monospace;
    color: #94a3b8;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 3px;
  }

  #log div {
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .controls { 
    display: flex; 
    gap: 10px; 
    flex-wrap: wrap;
    margin-top: 10px;
  }

  button {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 3px;
    flex: 1;
    min-width: 100px;
  }
  
  button:hover { 
    background: var(--accent); 
    color: white; 
    box-shadow: 0 0 20px var(--accent); 
  }

  /* Tablet */
  @media (max-width: 900px) {
    .main-container {
      flex-direction: column;
      gap: 15px;
    }
    
    .right-panel {
      width: 100%;
      min-height: auto;
    }

    #board {
      margin: 0 auto;
    }
  }

  /* Mobile */
  @media (max-width: 600px) {
    h1 {
      font-size: 20px;
    }

    .subtitle {
      font-size: 12px;
    }

    #board {
      width: min(400px, 95vw);
      height: min(400px, 95vw);
      padding: 8px;
      gap: 2px;
    }

    .right-panel {
      width: min(100%, 400px);
    }

    .stat-card {
      padding: 12px;
    }

    .log-container {
      min-height: 200px;
    }

    button {
      font-size: 10px;
      padding: 6px 12px;
    }
  }

  /* Scrollbar styling */
  #log::-webkit-scrollbar {
    width: 6px;
  }

  #log::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
  }

  #log::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 3px;
  }

  #log::-webkit-scrollbar-thumb:hover {
    background: #07d9e8;
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ NEURAL NET: GOMOKU v4.2</h1>
  <div class="subtitle">QUANTUM THREAT DETECTION ACTIVE</div>
</div>

<div class="main-container">
  <div id="board"></div>
  
  <div class="right-panel">
    <div class="stat-card">
      <div class="stat-label">System Status</div>
      <div class="stat-value" id="status" style="color: var(--player);">ONLINE</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">AI Logic Load</div>
      <div class="stat-value" id="ai-load">0.00ms</div>
    </div>

    <div class="log-container">
      <div class="log-label">Action Log</div>
      <div id="log"></div>
    </div>

    <div class="controls">
      <button onclick="resetGame()">🔄 Reset Game</button>
    </div>
  </div>
</div>

<script>
const N = 15;
const WIN = 5;
const EMPTY = 0, PLAYER = 1, AI = 2;
let grid = [];
let gameOver = false;

const WEIGHTS = {
  FIVE: 1000000,
  FOUR_OPEN: 50000,
  FOUR_BLOCKED: 5000,
  THREE_OPEN: 3000,
  THREE_BLOCKED: 500,
  TWO_OPEN: 100,
  ADJACENT: 10
};

function initBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  grid = Array(N * N).fill(EMPTY);
  for (let i = 0; i < N * N; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.onclick = () => playerMove(i);
    boardEl.appendChild(cell);
  }
  gameOver = false;
  addLog("🟢 Neural Link established...");
}

function addLog(msg) {
  const log = document.getElementById('log');
  const logEntry = document.createElement('div');
  logEntry.textContent = msg;
  log.appendChild(logEntry);
  log.scrollTop = log.scrollHeight;
}

function playerMove(idx) {
  if (grid[idx] !== EMPTY || gameOver) return;
  
  makeMove(idx, PLAYER);
  if (checkWin(idx, PLAYER)) return endGame("✅ CRITICAL FAILURE: AI LOST");
  
  document.getElementById('status').textContent = "CALCULATING";
  document.getElementById('status').style.color = "var(--ai)";
  
  const startTime = performance.now();
  setTimeout(() => {
    aiTurn();
    const timeTaken = (performance.now() - startTime).toFixed(2);
    document.getElementById('ai-load').textContent = timeTaken + "ms";
  }, 100);
}

function aiTurn() {
  if (gameOver) return;
  const move = getBestMove();
  makeMove(move, AI);
  addLog(`🤖 AI: [${Math.floor(move/N)},${move%N}]`);
  
  if (checkWin(move, AI)) return endGame("❌ TERMINAL STATE: AI WON");
  
  visualizeMindMap();
  document.getElementById('status').textContent = "WAITING";
  document.getElementById('status').style.color = "var(--player)";
}

function makeMove(idx, p) {
  grid[idx] = p;
  const cells = document.querySelectorAll('.cell');
  cells[idx].classList.add(p === PLAYER ? 'p1' : 'p2');
}

function getBestMove() {
  let bestScore = -Infinity;
  let move = -1;
  const scores = evaluateFullBoard();

  for (let i = 0; i < N * N; i++) {
    if (grid[i] === EMPTY && scores[i] > bestScore) {
      bestScore = scores[i];
      move = i;
    }
  }
  return move;
}

function evaluateFullBoard() {
  let heatmap = Array(N * N).fill(0);
  for (let i = 0; i < N * N; i++) {
    if (grid[i] !== EMPTY) continue;
    let aiScore = calculateCellPressure(i, AI);
    let playerScore = calculateCellPressure(i, PLAYER);
    heatmap[i] = aiScore + (playerScore * 1.3);
    const r = Math.floor(i / N), c = i % N;
    heatmap[i] += (7 - Math.abs(7 - r)) + (7 - Math.abs(7 - c));
  }
  return heatmap;
}

function calculateCellPressure(idx, p) {
  let total = 0;
  const dirs = [[1,0], [0,1], [1,1], [1,-1]];
  for (let [dr, dc] of dirs) {
    let line = getLineData(idx, dr, dc, p);
    total += scoreLine(line.count, line.blocks);
  }
  return total;
}

function getLineData(idx, dr, dc, p) {
  let r = Math.floor(idx / N), c = idx % N;
  let count = 1, blocks = 0;
  for (let i = 1; i < 5; i++) {
    let nr = r + dr * i, nc = c + dc * i;
    if (nr < 0 || nr >= N || nc < 0 || nc >= N) { blocks++; break; }
    if (grid[nr * N + nc] === p) count++;
    else if (grid[nr * N + nc] === EMPTY) break;
    else { blocks++; break; }
  }
  for (let i = 1; i < 5; i++) {
    let nr = r - dr * i, nc = c - dc * i;
    if (nr < 0 || nr >= N || nc < 0 || nc >= N) { blocks++; break; }
    if (grid[nr * N + nc] === p) count++;
    else if (grid[nr * N + nc] === EMPTY) break;
    else { blocks++; break; }
  }
  return { count, blocks };
}

function scoreLine(count, blocks) {
  if (count >= 5) return WEIGHTS.FIVE;
  if (blocks === 2) return 0;
  if (count === 4) return blocks === 0 ? WEIGHTS.FOUR_OPEN : WEIGHTS.FOUR_BLOCKED;
  if (count === 3) return blocks === 0 ? WEIGHTS.THREE_OPEN : WEIGHTS.THREE_BLOCKED;
  return count * 10;
}

function visualizeMindMap() {
  const scores = evaluateFullBoard();
  const maxScore = Math.max(...scores);
  const cells = document.querySelectorAll('.cell');
  cells.forEach((cell, i) => {
    cell.classList.remove('hint', 'danger');
    if (grid[i] === EMPTY) {
      if (scores[i] > maxScore * 0.8) cell.classList.add('danger');
      else if (scores[i] > maxScore * 0.5) cell.classList.add('hint');
    }
  });
}

function checkWin(idx, p) {
  const dirs = [[1,0], [0,1], [1,1], [1,-1]];
  const r = Math.floor(idx / N), c = idx % N;
  for (let [dr, dc] of dirs) {
    let count = 1;
    for (let i = 1; i < 5; i++) {
      let nr = r + dr * i, nc = c + dc * i;
      if (nr >= 0 && nr < N && nc >= 0 && nc < N && grid[nr * N + nc] === p) count++;
      else break;
    }
    for (let i = 1; i < 5; i++) {
      let nr = r - dr * i, nc = c - dc * i;
      if (nr >= 0 && nr < N && nc >= 0 && nc < N && grid[nr * N + nc] === p) count++;
      else break;
    }
    if (count >= WIN) return true;
  }
  return false;
}

function endGame(msg) {
  gameOver = true;
  document.getElementById('status').textContent = "OFFLINE";
  addLog(msg);
}

function resetGame() {
  document.getElementById('log').innerHTML = '';
  initBoard();
}

initBoard();
</script>
</body>
</html>
