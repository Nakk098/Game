<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tic Tac Toe 25×25</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#09090f;color:#e2e8f0;font-family:'Outfit',sans-serif}
body{display:flex;flex-direction:column}
#hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0f0f1c;border-bottom:1px solid #1e1e35;gap:8px}
.pi{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#f43f5e;transition:background .3s;flex-shrink:0}
#smsg{font-size:.82rem;font-weight:700;color:#f43f5e;transition:color .3s}
.sco{display:flex;gap:10px}
.si{text-align:center;min-width:32px}
.sl{font-size:.6rem;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.sv{font-size:.95rem;font-weight:700}
.sx{color:#f43f5e}.so{color:#06b6d4}.sd{color:#475569}
#vp{flex:1;overflow:hidden;position:relative;touch-action:none;cursor:grab;background:#09090f}
#vp:active{cursor:grabbing}
#bt{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#board{display:grid;grid-template-columns:repeat(25,28px);gap:2px}
.cell{width:28px;height:28px;background:#131322;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:1px solid #1c1c30;transition:background .1s;user-select:none}
.xc{color:#f43f5e}.oc{color:#06b6d4}
.lm{border-color:#7c3aed!important}
.wc{background:#2d1600!important;border-color:#fbbf24!important;animation:wp .6s ease-in-out infinite alternate}
@keyframes wp{from{box-shadow:0 0 4px #fbbf2488}to{box-shadow:0 0 14px #fbbf24}}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .18s ease-out forwards}
#ftr{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;background:#0f0f1c;border-top:1px solid #1e1e35}
.btn{padding:10px 18px;border-radius:10px;border:none;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .18s;min-height:44px;min-width:44px}
.bp{background:linear-gradient(135deg,#7c3aed,#9f67ff);color:#fff;box-shadow:0 3px 10px #7c3aed44}
.bp:active{transform:scale(.94)}
.bs{background:#17172a;border:1px solid #252540;color:#94a3b8}
.bs:active{transform:scale(.94)}
.sel{background:#17172a;border:1px solid #252540;color:#e2e8f0;padding:10px 12px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:.8rem;min-height:44px;outline:none;cursor:pointer}
#ovl{position:fixed;inset:0;background:#000000bb;display:flex;align-items:center;justify-content:center;z-index:99;opacity:0;pointer-events:none;transition:opacity .3s}
#ovl.show{opacity:1;pointer-events:all}
.rc{background:#0f0f1c;border:1px solid #1e1e35;border-radius:20px;padding:28px 36px;text-align:center;transform:scale(.85);transition:transform .3s;max-width:280px;width:90%}
#ovl.show .rc{transform:scale(1)}
.re{font-size:2.6rem}.rt{font-size:1.5rem;font-weight:900;margin:8px 0 4px}.rs{color:#475569;font-size:.84rem;margin-bottom:18px}
#tb{position:fixed;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7c3aed,#06b6d4);transform-origin:left;transform:scaleX(0);transition:transform .4s;z-index:50}
</style>
</head>
<body>
<div id="hdr">
  <div class="pi">
    <div class="dot" id="dot"></div>
    <span id="smsg">Your turn</span>
  </div>
  <div class="sco">
    <div class="si"><div class="sl">You</div><div class="sv sx" id="sx">0</div></div>
    <div class="si"><div class="sl">Draw</div><div class="sv sd" id="sd">0</div></div>
    <div class="si"><div class="sl">AI</div><div class="sv so" id="so">0</div></div>
  </div>
</div>
<div id="vp"><div id="bt"><div id="board"></div></div></div>
<div id="ftr">
  <select class="sel" id="diff"><option value="3">★★★ Extreme</option><option value="2">★★ Hard</option><option value="1">★ Medium</option></select>
  <button class="btn bp" id="rbtn">↺ New</button>
  <button class="btn bs" id="zbtn">⌖ Fit</button>
</div>
<div id="ovl"><div class="rc"><div class="re" id="re"></div><div class="rt" id="rt"></div><div class="rs" id="rs"></div><button class="btn bp" onclick="newGame()">Play Again</button></div></div>
<div id="tb"></div>
<script>
const N=25,W=5,CS=28,GP=2,SZ=CS+GP;
const BP=N*CS+(N-1)*GP;
let board,turn,over,lm=-1,sc={X:0,O:0,D:0},P={};
let zoom=1,panX=0,panY=0;
const $=id=>document.getElementById(id);
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rf=(a,b)=>Math.random()*(b-a)+a;
const IX=(r,c)=>r*N+c;
const DIRS=[[0,1],[1,0],[1,1],[1,-1]];

function applyT(){$('bt').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;}

function fitBoard(){
  const vp=$('vp'),vw=vp.clientWidth,vh=vp.clientHeight;
  zoom=Math.min(vw/(BP+4),vh/(BP+4));
  panX=(vw-BP*zoom)/2; panY=(vh-BP*zoom)/2;
  applyT();
}

function rollP(d){
  P={d,
    defW:d===3?rf(7,11):d===2?rf(4,7):rf(2,4),
    offW:d===3?rf(1,2):d===2?rf(1,2.5):rf(1,3),
    noise:d===3?ri(10,45):d===2?ri(30,80):ri(60,150),
    rnd:d===3?rf(.02,.07):d===2?rf(.05,.13):rf(.1,.24),
    cBias:rf(.7,1.8)
  };
}

function newGame(){
  board=new Array(N*N).fill(null);turn='X';over=false;lm=-1;
  $('ovl').classList.remove('show');
  rollP(parseInt($('diff').value));
  const b=$('board');b.innerHTML='';
  for(let i=0;i<N*N;i++){const c=document.createElement('div');c.className='cell';c.id='c'+i;b.appendChild(c);}
  fitBoard();upd();
}

function place(i,p){
  board[i]=p;lm=i;
  const el=$('c'+i);
  el.textContent=p==='X'?'✕':'○';
  el.classList.add(p==='X'?'xc':'oc','pop');
  document.querySelectorAll('.lm').forEach(e=>e.classList.remove('lm'));
  el.classList.add('lm');
}

function winOf(pos,p){
  const r0=Math.floor(pos/N),c0=pos%N;
  for(const [dr,dc]of DIRS){
    let arr=[pos];
    for(let s=1;s<W;s++){const r=r0+dr*s,c=c0+dc*s;if(r<0||r>=N||c<0||c>=N||board[IX(r,c)]!==p)break;arr.push(IX(r,c));}
    for(let s=1;s<W;s++){const r=r0-dr*s,c=c0-dc*s;if(r<0||r>=N||c<0||c>=N||board[IX(r,c)]!==p)break;arr.push(IX(r,c));}
    if(arr.length>=W)return arr;
  }return null;
}

function checkEnd(){
  if(lm<0)return false;
  const p=board[lm],w=winOf(lm,p);
  if(w){w.forEach(i=>$('c'+i).classList.add('wc'));end(p==='X'?'win':'lose');return true;}
  if(board.every(Boolean)){end('draw');return true;}
  return false;
}

function end(r){
  over=true;
  $('re').textContent=r==='win'?'🎉':r==='lose'?'😤':'🤝';
  $('rt').textContent=r==='win'?'You Win!':r==='lose'?'AI Wins!':'Draw!';
  $('rs').textContent=r==='win'?'Incredible — you beat the AI!':r==='lose'?'The AI wins this round.':'Board full — no winner.';
  if(r==='win'){sc.X++;$('sx').textContent=sc.X;}
  else if(r==='lose'){sc.O++;$('so').textContent=sc.O;}
  else{sc.D++;$('sd').textContent=sc.D;}
  setTimeout(()=>$('ovl').classList.add('show'),700);
}

function upd(){
  if(over)return;
  const isX=turn==='X';
  $('dot').style.background=isX?'#f43f5e':'#06b6d4';
  $('smsg').style.color=isX?'#f43f5e':'#06b6d4';
  $('smsg').textContent=isX?'Your turn':'AI thinking…';
}

// ── Touch: pan + pinch zoom ───────────────────────────────────────────────────
let ts=null,pd=0,pm=null,dragged=false;
const vp=$('vp');

function coordToCell(cx,cy){
  const r=vp.getBoundingClientRect();
  const bx=(cx-r.left-panX)/zoom, by=(cy-r.top-panY)/zoom;
  const col=Math.floor(bx/SZ), row=Math.floor(by/SZ);
  return(col>=0&&col<N&&row>=0&&row<N)?row*N+col:-1;
}

vp.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    ts=null;
    pd=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    pm={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
  }else if(e.touches.length===1){
    ts={x:e.touches[0].clientX,y:e.touches[0].clientY};dragged=false;
  }
},{passive:false});

vp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pd>0){
    const nd=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    const nm={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    const minZ=Math.min(vp.clientWidth,vp.clientHeight)/(BP+4)*.4;
    const nz=Math.max(minZ,Math.min(5,zoom*(nd/pd)));
    const vr=vp.getBoundingClientRect();
    const ox=pm.x-vr.left, oy=pm.y-vr.top;
    panX=ox-(ox-panX)*nz/zoom; panY=oy-(oy-panY)*nz/zoom;
    panX+=nm.x-pm.x; panY+=nm.y-pm.y;
    zoom=nz; pd=nd; pm=nm; applyT();
  }else if(e.touches.length===1&&ts){
    const dx=e.touches[0].clientX-ts.x, dy=e.touches[0].clientY-ts.y;
    if(!dragged&&Math.hypot(dx,dy)>6)dragged=true;
    if(dragged){panX+=dx;panY+=dy;ts={x:e.touches[0].clientX,y:e.touches[0].clientY};applyT();}
  }
},{passive:false});

vp.addEventListener('touchend',e=>{
  if(!dragged&&ts&&e.changedTouches.length){
    const t=e.changedTouches[0];
    if(Math.hypot(t.clientX-ts.x,t.clientY-ts.y)<10)hMove(coordToCell(ts.x,ts.y));
  }
  if(e.touches.length===0){ts=null;pd=0;}
});

// ── Mouse support ─────────────────────────────────────────────────────────────
let mst=null,mdr=false;
vp.addEventListener('mousedown',e=>{mst={x:e.clientX,y:e.clientY};mdr=false;});
vp.addEventListener('mousemove',e=>{if(!mst)return;if(!mdr&&Math.hypot(e.clientX-mst.x,e.clientY-mst.y)>5)mdr=true;if(mdr){panX+=e.movementX;panY+=e.movementY;applyT();}});
vp.addEventListener('mouseup',e=>{if(!mdr&&mst)hMove(coordToCell(e.clientX,e.clientY));mst=null;});
vp.addEventListener('wheel',e=>{e.preventDefault();const nz=Math.max(.2,Math.min(5,zoom*(1-e.deltaY*.001)));const r=vp.getBoundingClientRect();const ox=e.clientX-r.left,oy=e.clientY-r.top;panX=ox-(ox-panX)*nz/zoom;panY=oy-(oy-panY)*nz/zoom;zoom=nz;applyT();},{passive:false});

// ── Human move ────────────────────────────────────────────────────────────────
function hMove(i){
  if(over||turn!=='X'||i<0||board[i])return;
  if(navigator.vibrate)navigator.vibrate(30);
  place(i,'X');if(checkEnd())return;
  turn='O';upd();
  $('tb').style.transform='scaleX(.4)';
  setTimeout(doAI,ri(100,300));
}

// ── ADVANCED AI ───────────────────────────────────────────────────────────────
// Threat weights (priority order enforced in aiPick)
const TW={W5:1e9,B5:1e8,O4:8e6,B4:1e6,O3:5e4,B3:1e4,O2_open:400,O2_half:250,O2_split:300,fork:800};

// Candidate cells within radius 2 of any placed piece
function cands(){
  const s=new Set();
  for(let i=0;i<N*N;i++){
    if(!board[i])continue;
    const r=Math.floor(i/N),c=i%N;
    for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
      if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<N&&nc>=0&&nc<N&&!board[IX(nr,nc)])s.add(IX(nr,nc));
    }
  }
  if(!s.size)return[IX(12+ri(-3,3),12+ri(-3,3))];
  return[...s];
}

// Score a window of W cells for player p — detects open/half-open/split patterns
function windowScore(cells,p){
  let cnt=0,open=0,pos=[];
  for(let k=0;k<cells.length;k++){
    const v=cells[k];
    if(v===p){cnt++;pos.push(k);}
    else if(v===null)open++;
    else return 0; // blocked by opponent
  }
  if(!cnt||!open)return 0;
  // Split detection: X_X (gap between first and last of same player < W-1)
  const spread=pos.length>=2?pos[pos.length-1]-pos[0]:0;
  const isSplit=pos.length>=2&&spread<W-1&&open>0&&cnt<spread+1;
  if(cnt===4)return open>=1?TW.O4:0;
  if(cnt===3)return open===2?TW.O3:TW.B3;
  if(cnt===2){
    if(isSplit)return TW.O2_split;
    return open===2?TW.O2_open:TW.O2_half;
  }
  if(cnt===1)return open===2?30:10;
  return 0;
}

// Evaluate all lines through pos for player p
function evalAt(pos,p){
  board[pos]=p;let score=0;
  const r0=Math.floor(pos/N),c0=pos%N;
  for(const [dr,dc]of DIRS){
    for(let s=-(W-1);s<=0;s++){
      const cells=[];let ok=true;
      for(let k=s;k<s+W;k++){
        const r=r0+dr*k,c=c0+dc*k;
        if(r<0||r>=N||c<0||c>=N){ok=false;break;}
        cells.push(board[IX(r,c)]);
      }
      if(ok)score+=windowScore(cells,p);
    }
  }
  board[pos]=null;return score;
}

// Count distinct threat directions (for fork detection)
function forkDirs(pos,p){
  board[pos]=p;
  const dirs=new Set();
  const r0=Math.floor(pos/N),c0=pos%N;
  for(let d=0;d<DIRS.length;d++){
    const [dr,dc]=DIRS[d];
    for(let s=-(W-1);s<=0;s++){
      let cnt=0,open=0,ok=true;
      for(let k=s;k<s+W;k++){
        const r=r0+dr*k,c=c0+dc*k;
        if(r<0||r>=N||c<0||c>=N){ok=false;break;}
        const v=board[IX(r,c)];
        if(v===p)cnt++;else if(!v)open++;else{ok=false;break;}
      }
      if(ok&&cnt>=3&&open>=1)dirs.add(d);
    }
  }
  board[pos]=null;return dirs.size;
}

// Safe-move filter: after placing O at pos, can X win in one move?
function isSafe(pos){
  board[pos]='O';
  let safe=true;
  const r0=Math.floor(pos/N),c0=pos%N;
  outer:for(let dr=-4;dr<=4;dr++)for(let dc=-4;dc<=4;dc++){
    const nr=r0+dr,nc=c0+dc;
    if(nr<0||nr>=N||nc<0||nc>=N)continue;
    const ni=IX(nr,nc);
    if(board[ni])continue;
    board[ni]='X';
    if(winOf(ni,'X')){safe=false;board[ni]=null;break outer;}
    board[ni]=null;
  }
  board[pos]=null;return safe;
}

// Main AI picker — strict priority order
function aiPick(){
  const cl=cands();
  if(cl.length===1)return cl[0];

  // P1: AI immediate win
  for(const i of cl){board[i]='O';const w=winOf(i,'O');board[i]=null;if(w)return i;}
  // P2: Block player immediate win
  for(const i of cl){board[i]='X';const w=winOf(i,'X');board[i]=null;if(w)return i;}
  // P3: Block open-4 (player wins next turn guaranteed)
  const b4=cl.filter(i=>evalAt(i,'X')>=TW.O4);
  if(b4.length){b4.sort((a,b)=>evalAt(b,'O')-evalAt(a,'O'));return b4[0];}

  // Score everything
  const scored=cl.map(i=>{
    let s=0;
    const dS=evalAt(i,'X'); // defensive value
    const oS=evalAt(i,'O'); // offensive value
    s+=dS*P.defW + oS*P.offW;
    // Anti-fork
    const pf=forkDirs(i,'X');
    s+=pf>=2?5e6*P.defW:pf===1?TW.fork*P.defW:0;
    // AI fork creation
    const af=forkDirs(i,'O');
    s+=af>=2?2e6*P.offW:0;
    // Center gravity
    const r=Math.floor(i/N),c=i%N;
    s+=(24-Math.abs(r-12)-Math.abs(c-12))*P.cBias*2;
    // Proximity bonus
    let prox=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<N&&nc>=0&&nc<N&&board[IX(nr,nc)])prox++;}
    s+=prox*25+(Math.random()*2-1)*P.noise;
    return[i,s];
  });
  scored.sort((a,b)=>b[1]-a[1]);

  // Safe-move filter: skip moves that hand X a free win
  for(let t=0;t<Math.min(8,scored.length);t++){
    const [mv]=scored[t];
    if(isSafe(mv)){
      // Occasional randomness among near-equal top moves
      if(t===0&&Math.random()<P.rnd&&scored.length>4){
        const top=scored[0][1];
        const pool=scored.slice(0,Math.min(5,scored.length)).filter(([,s])=>s>=top*.95);
        return pool[ri(0,pool.length-1)][0];
      }
      return mv;
    }
  }
  return scored[0][0]; // fallback
}

function doAI(){
  const mv=aiPick();
  $('tb').style.transform='scaleX(1)';
  setTimeout(()=>{$('tb').style.transform='scaleX(0)';place(mv,'O');if(!checkEnd()){turn='X';upd();}},80);
}

$('rbtn').addEventListener('click',newGame);
$('zbtn').addEventListener('click',fitBoard);
window.addEventListener('resize',fitBoard);
newGame();
</script>
</body>
</html>
